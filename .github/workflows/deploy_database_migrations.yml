name: Deploy Database Migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'src/db/seeds/**'
      - 'src/lib/hyrox-generic-plans/**'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  deployments: write
  issues: write
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      migrations: ${{ steps.filter.outputs.migrations }}
      seeds: ${{ steps.filter.outputs.seeds }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            migrations:
              - 'supabase/migrations/**'
            seeds:
              - 'src/db/seeds/**'
              - 'src/lib/hyrox-generic-plans/**'

  deploy-migrations:
    needs: changes
    if: ${{ needs.changes.outputs.migrations == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment: production  # Requires manual approval (optional but recommended)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check migration status before deployment
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          echo "Linking to production project..."
          supabase link --project-ref $PROJECT_REF

          echo "Checking current migration status..."
          supabase migration list --linked

      - name: Deploy migrations to production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          echo "Deploying migrations to production..."
          supabase db push --linked

          echo "Migrations deployed successfully!"

      - name: Verify deployment
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          echo "Verifying migration status..."
          supabase migration list --linked

      - name: Create GitHub deployment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: 'Database migrations deployed',
              auto_merge: false,
              required_contexts: []
            })

      - name: Notify on failure (GitHub Issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Migration Deployment Failed',
              body: `Migration deployment failed for commit ${context.sha}\n\nCheck the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`,
              labels: ['bug', 'database', 'urgent']
            })

  deploy-seeds:
    needs: [changes, deploy-migrations]
    # Run after migrations succeed (or when no migration changes were detected,
    # meaning deploy-migrations was skipped). Skip if migrations failed.
    if: |
      always() &&
      (needs.deploy-migrations.result == 'success' || needs.deploy-migrations.result == 'skipped') &&
      (needs.changes.outputs.seeds == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy seeds to production
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: npm run db:seed:deploy

      - name: Notify on failure (GitHub Issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Seed Deployment Failed',
              body: `Seed deployment failed for commit ${context.sha}\n\nCheck the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`,
              labels: ['bug', 'database', 'urgent']
            })
